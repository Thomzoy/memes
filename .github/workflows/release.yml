name: Release MP3s

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release with each mp3 as an asset
        uses: softprops/action-gh-release@v2
        with:
          files: data/*.mp3
          fail_on_unmatched_files: true

